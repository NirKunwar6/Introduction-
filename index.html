 <script src="https://js.puter.com/v2/"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>

// 1. Initialize EmailJS
(function() {
    emailjs.init("aNDohUpb1KOb8hHnb");
})();



// --- AUTO VISIT NOTIFICATION ---
window.addEventListener("load", () => {
    // 1. Send the email notification
    const visitParams = {
        user_message: "SYSTEM ALERT",
        ai_response: "A visitor has just opened your portfolio link.",
        name: "Visitor Alert",
        email: "system@mrtechnician.com"
    };

    emailjs.send("service_vl56w0b", "template_0o5x712", visitParams)
        .then(() => console.log("Visit alert sent!"))
        .catch((err) => console.log("Alert failed", err));

    // 2. Show the greeting message in the chat UI
    const chatBox = document.getElementById("chatBox");
    if (chatBox) {
        chatBox.innerHTML += `<div class="bot">Hello there! I am Nir's personal assistant. How may I help you?</div>`;
    }
});
 
  async function sendMessage() {
    const input = document.getElementById("userInput");
    const userText = input.value.trim();
    if (!userText) return;

    // Show User Message in UI
    chatBox.innerHTML += `<div class="user">${userText}</div>`;
    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;

    const typingId = "typing-" + Date.now();
    chatBox.innerHTML += `<div class="bot" id="${typingId}" style="opacity:.7;font-style:italic;">Typing...</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        // Get Response from Puter AI
        const resp = await puter.ai.chat([
            { role: "system", content: NIR_BRAIN },
            { role: "user", content: userText }
        ]);

        const aiReply = resp.message.content;
        const typingMsg = document.getElementById(typingId);
        if (typingMsg) typingMsg.remove();

        // Show AI Response in UI
        chatBox.innerHTML += `<div class="bot">${aiReply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        // ✅ MATCHING YOUR SUCCESSFUL TEST LABELS
        const emailParams = {
            user_message: userText,    // Matches the "Nothing" field in your test
            ai_response: aiReply,      // Matches the "Everything" field in your test
            name: "Portfolio Visitor",
            email: "visitor@site.com"
        };

        // Send to your email
        emailjs.send("service_vl56w0b", "template_0o5x712", emailParams)
            .then(() => console.log("Success: Sent to nirkunwar6@gmail.com"))
            .catch((err) => console.error("Email failed:", err));

    } catch (e) {
        console.error("AI Error:", e);
    }
}

// Event Listeners
document.getElementById("userInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});

document.querySelector(".chat-btn").addEventListener("click", sendMessage);

document.addEventListener("DOMContentLoaded", function () {

    const btn = document.getElementById("paFloatBtn");
    const popup = document.getElementById("paChatPopup");
    const closeBtn = document.getElementById("closeChat");

    // OPEN CHAT
    btn.addEventListener("click", function () {
        popup.style.display = "flex";
    });

    // CLOSE CHAT
    closeBtn.addEventListener("click", function () {
        popup.style.display = "none";
    });

});

</script>
